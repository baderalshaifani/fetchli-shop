<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fetchli — مساعد التسوق الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Root ── */
:root {
  --gold:    #c8a055;
  --gold2:   #e8c87a;
  --bg:      #0a0a0f;
  --bg2:     #121118;
  --bg3:     #1a1820;
  --border:  rgba(255,255,255,0.08);
  --text:    #f0e6d3;
  --text2:   #a09890;
  --green:   #4caf7a;
}

body {
  background: var(--bg);
  font-family: 'Tajawal', sans-serif;
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

/* ── Header ── */
.header {
  width: 100%; max-width: 820px;
  padding: 14px 20px 10px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; font-weight: 900; color: #0a0a0f;
  letter-spacing: -1px;
}
.logo-text { font-size: 18px; font-weight: 700; color: var(--text); }
.logo-sub  { font-size: 11px; color: var(--text2); margin-top: 1px; }
.location-badge {
  margin-right: auto;
  display: flex; align-items: center; gap: 5px;
  background: rgba(200,160,85,0.08);
  border: 1px solid rgba(200,160,85,0.2);
  padding: 5px 11px; border-radius: 20px;
  font-size: 12px; color: var(--gold); cursor: pointer;
}

/* ── Chat Area ── */
.chat-area {
  width: 100%; max-width: 820px;
  flex: 1; overflow-y: auto;
  padding: 14px 16px 6px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ── Messages ── */
.msg-row { display: flex; align-items: flex-start; gap: 9px; }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.msg-avatar.ai   { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #0a0a0f; }
.msg-avatar.user { background: rgba(255,255,255,0.07); }

.msg-bubble {
  max-width: 72%; padding: 10px 14px;
  border-radius: 16px; font-size: 14px; line-height: 1.7;
  white-space: pre-line;
}
.msg-bubble.ai {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: #d4cfc8;
  border-top-right-radius: 4px;
}
.msg-bubble.user {
  background: linear-gradient(135deg, rgba(200,160,85,0.18), rgba(232,200,122,0.12));
  border: 1px solid rgba(200,160,85,0.22);
  color: var(--text);
  border-top-left-radius: 4px;
}

/* ── Typing ── */
.typing-bubble {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-top-right-radius: 4px;
  padding: 12px 16px;
  display: flex; gap: 5px; align-items: center;
}
.typing-bubble span {
  width: 7px; height: 7px;
  background: var(--gold);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: .2s; }
.typing-bubble span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity: .4; }
  30%          { transform: translateY(-6px); opacity: 1; }
}

/* ── Products Grid ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 11px;
}
.product-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: all .25s ease; cursor: pointer;
}
.product-card:hover {
  border-color: rgba(200,160,85,0.35);
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(200,160,85,0.09);
}
.product-img-wrap { position: relative; height: 145px; overflow: hidden; }
.product-img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.product-card:hover .product-img { transform: scale(1.04); }
.product-badge {
  position: absolute; top: 9px; right: 9px;
  background: rgba(200,160,85,0.92); color: #0a0a0f;
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}
.product-body   { padding: 10px; }
.product-name   { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
.product-store  { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
.dot            { width: 6px; height: 6px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
.rating         { margin-right: auto; font-size: 10px; color: var(--gold); }
.product-price  { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 9px; }
.product-actions { display: flex; gap: 6px; }
.btn-details {
  flex: 1; padding: 6px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text2);
  font-family: 'Tajawal', sans-serif; font-size: 11px; cursor: pointer;
  transition: all .2s;
}
.btn-details:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.btn-buy {
  flex: 1; padding: 6px; border-radius: 8px; border: none;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0a0a0f;
  font-family: 'Tajawal', sans-serif; font-size: 11px; font-weight: 700;
  cursor: pointer; text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s;
}
.btn-buy:hover { opacity: .85; }

/* ── Suggestions ── */
.chips {
  width: 100%; max-width: 820px;
  display: flex; gap: 7px; flex-wrap: wrap;
  padding: 6px 16px; flex-shrink: 0;
}
.chip {
  background: rgba(200,160,85,0.07);
  border: 1px solid rgba(200,160,85,0.18);
  color: var(--gold);
  font-family: 'Tajawal', sans-serif; font-size: 12px;
  padding: 5px 12px; border-radius: 20px;
  cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.chip:hover { background: rgba(200,160,85,0.15); }

/* ── Input Bar ── */
.input-bar {
  width: 100%; max-width: 820px;
  padding: 8px 16px 16px; flex-shrink: 0;
}
.input-inner {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 9px 13px;
  transition: border-color .2s;
}
.input-inner:focus-within { border-color: rgba(200,160,85,0.38); }
.input-inner input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Tajawal', sans-serif;
  font-size: 14px; direction: rtl;
}
.input-inner input::placeholder { color: #454045; }
.btn-img {
  width: 32px; height: 32px; border-radius: 9px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text2); font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; flex-shrink: 0;
}
.btn-img:hover { background: rgba(255,255,255,0.09); color: var(--text); }
#sendBtn {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none; color: #0a0a0f; font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: opacity .2s;
}
#sendBtn:hover { opacity: .85; }
#imageInput { display: none; }

/* ── صورة المستخدم المرفوعة ── */
.img-preview {
  max-width: 200px; max-height: 200px;
  width: auto; height: auto;
  border-radius: 12px; object-fit: contain;
  border: 1px solid var(--border); display: block;
}

/* ── Typing wrapper ── */
.typing-wrap-inner { display: flex; flex-direction: column; gap: 5px; }
.typing-label { font-size: 11px; color: var(--text2); }

/* ── Cheaper label ── */
.cheaper-label { font-size: 12px; color: var(--gold); padding: 2px 4px; opacity: .8; }

/* ── Product Page (ministore محسّن) ── */
.ministore-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  align-items: flex-end; justify-content: center;
}
.ministore-panel {
  width: 100%; max-width: 580px;
  height: 92vh;
  background: var(--bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px 24px 0 0;
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: slideUp .3s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* ── Product Page Header ── */
.ms-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ms-store-name {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; font-weight: 600; color: var(--text);
}
.ms-verified {
  background: rgba(76,175,122,0.12);
  border: 1px solid rgba(76,175,122,0.28);
  color: var(--green); font-size: 10px;
  padding: 2px 8px; border-radius: 20px;
}
#ms-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: none;
  color: var(--text2); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#ms-close:hover { background: rgba(255,80,80,0.15); color: #ff5f57; }

/* ── Product Page Body (scrollable) ── */
.ms-body {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  padding: 0;
}
.ms-body::-webkit-scrollbar { width: 3px; }
.ms-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

/* ── صور المنتج ── */
.ms-images {
  position: relative;
  width: 100%; height: 280px;
  background: var(--bg2);
  overflow: hidden; flex-shrink: 0;
}
#ms-img {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 16px;
}
.ms-img-badge {
  position: absolute; top: 12px; right: 12px;
  background: rgba(200,160,85,0.92); color: #0a0a0f;
  font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}

/* ── تفاصيل المنتج ── */
.ms-details {
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.ms-title {
  font-size: 16px; font-weight: 700;
  color: var(--text); line-height: 1.5;
}
.ms-rating-row {
  display: flex; align-items: center; gap: 10px;
}
.ms-stars { color: #f5a623; font-size: 14px; }
.ms-rating-num { font-size: 13px; color: var(--text2); }
.ms-price-row {
  display: flex; align-items: baseline; gap: 10px;
}
.ms-price-main {
  font-size: 26px; font-weight: 900; color: var(--gold);
}
.ms-price-old {
  font-size: 14px; color: var(--text2);
  text-decoration: line-through;
}
.ms-discount {
  font-size: 12px; font-weight: 700;
  color: var(--green);
  background: rgba(76,175,122,0.1);
  padding: 2px 8px; border-radius: 20px;
}

/* ── المتجر ── */
.ms-store-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.ms-store-icon { font-size: 18px; }
.ms-store-info { flex: 1; }
.ms-store-label { font-size: 11px; color: var(--text2); }
.ms-store-val   { font-size: 13px; font-weight: 600; color: var(--text); }
.ms-store-badge {
  font-size: 10px; color: var(--green);
  background: rgba(76,175,122,0.1);
  border: 1px solid rgba(76,175,122,0.2);
  padding: 3px 8px; border-radius: 20px;
}

/* ── مميزات ── */
.ms-features {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.ms-feature {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px; color: var(--text2);
}
.ms-feature-icon { font-size: 15px; }

/* ── زر الشراء ── */
.ms-footer {
  padding: 14px 20px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#ms-link {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 15px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0a0a0f; font-family: 'Tajawal', sans-serif;
  font-size: 16px; font-weight: 800;
  text-decoration: none; border: none; cursor: pointer;
  transition: opacity .2s; letter-spacing: .3px;
}
#ms-link:hover { opacity: .88; }
#ms-link .arrow { font-size: 18px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">f</div>
  <div>
    <div class="logo-text">fetchli</div>
    <div class="logo-sub">مساعد التسوق الذكي</div>
  </div>
  <div class="location-badge">
    <span id="locationFlag">🇸🇦</span>
    <span id="locationName">السعودية</span>
    <span>▾</span>
  </div>
</header>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="msg-row ai">
    <div class="msg-avatar ai">✦</div>
    <div class="msg-bubble ai">مرحباً! أنا fetchli 🛍️
أرسل لي اسم أي منتج أو صورته وسأبحث لك في أفضل المتاجر فوراً.</div>
  </div>
</div>

<!-- Chips -->
<div class="chips">
  <button class="chip" data-query="شنطة شانيل">👜 شنطة شانيل</button>
  <button class="chip" data-query="iPhone 15">📱 iPhone 15</button>
  <button class="chip" data-query="عطر نسائي">🌸 عطر نسائي</button>
  <button class="chip" data-query="ساعة رولكس">⌚ ساعة رولكس</button>
  <button class="chip" data-query="أحذية نايك">👟 نايك</button>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-inner">
    <input type="text" id="msgInput" placeholder="اكتب اسم المنتج أو أرسل صورة...">
    <label for="imageInput" class="btn-img" title="رفع صورة">📷</label>
    <input type="file" id="imageInput" accept="image/*">
    <button id="sendBtn">↩</button>
  </div>
</div>

<!-- Product Page -->
<div class="ministore-overlay" id="ministore">
  <div class="ministore-panel">

    <!-- Header -->
    <div class="ms-header">
      <div class="ms-store-name">
        🛍️ <span id="ms-store"></span>
        <span class="ms-verified">✓ موثوق</span>
      </div>
      <button id="ms-close">✕</button>
    </div>

    <!-- Body -->
    <div class="ms-body">

      <!-- صورة المنتج -->
      <div class="ms-images">
        <img id="ms-img" src="" alt="">
        <span class="ms-img-badge" id="ms-badge"></span>
      </div>

      <!-- التفاصيل -->
      <div class="ms-details">

        <div class="ms-title" id="ms-name"></div>

        <div class="ms-rating-row">
          <span class="ms-stars">⭐⭐⭐⭐⭐</span>
          <span class="ms-rating-num" id="ms-rating"></span>
        </div>

        <div class="ms-price-row">
          <span class="ms-price-main" id="ms-price"></span>
          <span class="ms-discount" id="ms-discount"></span>
        </div>

        <div class="ms-store-row">
          <span class="ms-store-icon">🏪</span>
          <div class="ms-store-info">
            <div class="ms-store-label">المتجر</div>
            <div class="ms-store-val" id="ms-store-val"></div>
          </div>
          <span class="ms-store-badge">✓ متحقق</span>
        </div>

        <div class="ms-features">
          <div class="ms-feature"><span class="ms-feature-icon">🚚</span> توصيل سريع</div>
          <div class="ms-feature"><span class="ms-feature-icon">↩️</span> إرجاع مجاني</div>
          <div class="ms-feature"><span class="ms-feature-icon">🔒</span> دفع آمن</div>
          <div class="ms-feature"><span class="ms-feature-icon">✅</span> منتج أصلي</div>
        </div>

      </div>
    </div>

    <!-- زر الشراء — الوحيد اللي يطلع من fetchli -->
    <div class="ms-footer">
      <a id="ms-link" href="#">
        اشتري الآن <span class="arrow">←</span>
      </a>
    </div>

  </div>
</div>
<meta name='impact-site-verification' value='a1d8e0c5-64d8-43b2-8d6c-25ed2de17db1'>
<script src="app.js"></script>
<!-- Impact Verification -->
</body>
</html>
