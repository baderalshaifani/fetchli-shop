<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fetchli — مساعدك الذكي للتسوق والسفر</title>
  <meta name="description" content="fetchli — مساعد ذكي للتسوق والسفر، ابحث عن أي منتج أو رحلة بالصورة أو النص">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="FLOGO.png">

  <!-- Travelpayouts Drive -->
  <script nowprocket data-noptimize="1" data-cfasync="false" data-wpfc-render="false" seraph-accel-crit="1" data-no-defer="1">
    (function () {
      var script = document.createElement("script");
      script.async = 1;
      script.src = 'https://tp-em.com/NTM1MjAx.js?t=535201';
      document.head.appendChild(script);
    })();
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════
     Header
     ══════════════════════════════ -->
<header class="header">

  <!-- الشعار الفخم -->
  <div class="logo-wrap">
    <img src="#" alt="fetchli" class="logo-icon-img"
         style="width:40px;height:40px;border-radius:12px;object-fit:cover;object-position:right center;flex-shrink:0;">
    <div>
      <div class="logo-name">fetchli<span class="logo-dot"></span></div>
      <div class="logo-sub" id="modeSubtitle"></div>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabShop" onclick="switchMode('shop')"></button>
    <button class="mode-tab" id="tabTravel" onclick="switchMode('travel')"></button>
  </div>

  <!-- Location -->
  <div class="location-badge">
    <span id="locationFlag">🌍</span>
    <span id="locationName"></span>
    <span>▾</span>
  </div>

</header>

<!-- ══════════════════════════════
     Chat Area
     ══════════════════════════════ -->
<div class="chat-area" id="chatArea">
  <div class="msg-row ai">
    <div class="msg-avatar ai">
      <img src="FLOGO.png" alt="fetchli"
           style="width:32px;height:32px;border-radius:50%;object-fit:cover;object-position:right center;">
    </div>
    <div class="msg-bubble ai" id="welcomeMsg"></div>
  </div>
</div>

<!-- ══════════════════════════════
     Chips
     ══════════════════════════════ -->
<div class="chips-wrapper">
  <div class="chips-shop" id="chipsShop" style="display:flex;gap:7px;padding:8px 18px;overflow-x:auto;scrollbar-width:none;"></div>
  <div class="chips-travel" id="chipsTravel" style="display:none;gap:7px;padding:8px 18px;overflow-x:auto;scrollbar-width:none;"></div>
</div>

<!-- ══════════════════════════════
     Input Bar
     ══════════════════════════════ -->
<div class="input-bar">
  <div class="input-inner">
    <input type="text" id="msgInput" placeholder="">
    <label for="imageInput" class="btn-img" title="رفع صورة">📷</label>
    <input type="file" id="imageInput" accept="image/*">
    <button id="sendBtn">↩</button>
  </div>
</div>

<!-- ══════════════════════════════
     Product Modal
     ══════════════════════════════ -->
<div class="ministore-overlay" id="ministore">
  <div class="ministore-panel">

    <div class="ms-header">
      <div class="ms-store-name">
        🛍️ <span id="ms-store"></span>
        <span class="ms-verified" id="ms-verified">✓ موثوق</span>
      </div>
      <button id="ms-close">✕</button>
    </div>

    <div class="ms-body">
      <div class="ms-images">
        <img id="ms-img" src="" alt="">
        <span class="ms-img-badge" id="ms-badge"></span>
      </div>
      <div class="ms-details">
        <div class="ms-title" id="ms-name"></div>
        <div class="ms-rating-row">
          <span class="ms-stars">⭐⭐⭐⭐⭐</span>
          <span class="ms-rating-num" id="ms-rating"></span>
        </div>
        <div class="ms-price-row">
          <span class="ms-price-main" id="ms-price"></span>
        </div>
        <div class="ms-store-row">
          <span class="ms-store-icon">🏪</span>
          <div class="ms-store-info">
            <div class="ms-store-label" id="store-label">المتجر</div>
            <div class="ms-store-val" id="ms-store-val"></div>
          </div>
          <span class="ms-store-badge" id="ms-store-badge">✓ متحقق</span>
        </div>
      </div>
    </div>

    <div class="ms-features">
      <div class="ms-feature" id="feat-delivery">🚚 توصيل سريع</div>
      <div class="ms-feature" id="feat-returns">↩️ إرجاع مجاني</div>
      <div class="ms-feature" id="feat-secure">🔒 دفع آمن</div>
      <div class="ms-feature" id="feat-original">✅ منتج أصلي</div>
    </div>

    <div class="ms-footer">
      <a id="ms-link" href="#" target="_blank" rel="noopener">اشتري الآن ←</a>
    </div>

  </div>
</div>

<!-- Modules -->
<script src="modules/shop.js"></script>
<script src="modules/travel.js"></script>
<script src="app.js"></script>

</body>
</html>
